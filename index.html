<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JS Dev Portfolio | Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-card">
        <h1>DevFlow <span class="badge">v1.0</span></h1>
        <div class="input-box">
            <input type="text" id="taskInput" placeholder="Enter your next sprint task...">
            <button id="addBtn">Push Task</button>
        </div>
        <div id="status">Active Tasks: <span id="count">0</span></div>
        <ul id="taskList"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
