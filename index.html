<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Dashboard | JS & API</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard">
        <div class="card weather-card">
            <h2>Weather Monitor</h2>
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Enter city...">
                <button onclick="getWeather()">Check</button>
            </div>
            <div id="weatherResult" class="result">
                <h3 id="cityName">Berlin</h3>
                <div class="weather-icon" id="weatherIcon">☁️</div>
                <div class="temp" id="temp">--°C</div>
                <p id="description">Waiting for input...</p>
            </div>
        </div>

        <div class="card crypto-card">
            <h2>Crypto Tracker</h2>
            <div class="crypto-list">
                <div class="coin">
                    <span>BTC:</span>
                    <span id="btcPrice" class="price">Loading...</span>
                </div>
                <div class="coin">
                    <span>ETH:</span>
                    <span id="ethPrice" class="price">Loading...</span>
                </div>
            </div>
            <button onclick="getCrypto()">Refresh Market</button>
            <p class="last-sync">Last sync: <span id="syncTime">--:--:--</span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
